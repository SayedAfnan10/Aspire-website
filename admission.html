<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admission - Aspire Technical Institute</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', sans-serif;
}

body{
    background: linear-gradient(to right, #0b1320, #111c2e);
    color:#e5e7eb;
}

/* HEADER */
header{
    background:#0b1320;
    padding:15px 0;
    text-align:center;
    color:white;
    font-size:24px;
    font-weight:bold;
    border-bottom:2px solid #d4af37;
}

/* NAVBAR */
nav{
    background:#111c2e;
    padding:12px;
    text-align:center;
    border-bottom:1px solid rgba(212,175,55,0.2);
}

nav a{
    color:#e5e7eb;
    text-decoration:none;
    margin:0 12px;
    font-weight:500;
    transition:0.3s;
}

nav a:hover{
    color:#d4af37;
}

/* MAIN CONTAINER */
.container{
    width:80%;
    max-width:500px;
    margin:40px auto;
    background:#111c2e;
    padding:30px;
    border-radius:12px;
    box-shadow:0 0 20px rgba(212,175,55,0.1);
    border:1px solid rgba(212,175,55,0.2);
}

/* TITLE */
h1{
    margin-bottom:20px;
    color:#ffffff;
    text-align:center;
}

/* FORM */
form{
    display:flex;
    flex-direction:column;
}

label{
    margin-bottom:5px;
    font-weight:500;
    color:#d4af37;
}

/* INPUTS */
input, select{
    padding:10px;
    margin-bottom:15px;
    border:1px solid rgba(212,175,55,0.2);
    border-radius:6px;
    font-size:14px;
    background:#0b1320;
    color:#e5e7eb;
    transition:0.3s;
}

input:focus, select:focus{
    border-color:#d4af37;
    outline:none;
    box-shadow:0 0 8px rgba(212,175,55,0.3);
}

/* BUTTON */
button{
    padding:12px;
    background:#d4af37;
    color:#0b1320;
    border:none;
    border-radius:6px;
    font-size:16px;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
}

button:hover{
    background:#f5d76e;
}

/* FOOTER */
footer{
    background:#0b1320;
    color:#cbd5e1;
    display:flex;
    justify-content:space-between;
    padding:15px 30px;
    margin-top:30px;
    border-top:2px solid #d4af37;
}

footer a{
    color:#d4af37;
    text-decoration:none;
}

footer a:hover{
    text-decoration:underline;
}
</style>
</head>

<body>

<header>
    Aspire Technical Institute
</header>

<nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="courses.html">Courses</a>
    <a href="admission.html">Admission</a>
    <a href="gallery.html">Gallery</a>
    <a href="contact.html">Contact</a>
</nav>

<div class="container">

    <h1>Admission Form</h1>

    <form>
        <label>Name</label>
        <input type="text" placeholder="Enter your name">

        <label>Email</label>
        <input type="email" placeholder="Enter your email">

        <label>Phone</label>
        <input type="text" placeholder="Enter your phone number">

        <label>Course</label>
        <select>
            <option>Computer Diploma</option>
            <option>Python</option>
            <option>Tally</option>
             <option>web designing</option>
              <option>cyber</option>
        </select>

        <button type="submit">Submit</button>
    </form>

</div>
<footer>
    <div>
        © 2026 Aspire Technical Institute
    </div>

    <div>
        Developed by <strong>SAYED AFNAN</strong> |
        <a href="https://github.com/yourusername" target="_blank">GitHub</a>
    </div>
</footer>

</body>
</html>
