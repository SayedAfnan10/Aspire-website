    margin:0;

body{
    background: linear-gradient(to right, #0b1320, #111c2e);

/* HEADER */
header{
    background:#0b1320;
    padding:15px 0;
    text-align:center;
    color:white;
    font-size:24px;

    border-bottom:2px solid #d4af37;

nav{
    background:#111c2e;

nav a{
    color:#e5e7eb;
    text-decoration:none;
    margin:0 12px;
    font-weight:500;

}

nav a:hover{
    color:#d4af37;
}

.container{
    width:80%;

    margin:40px auto;
    background:#111c2e;
    padding:30px;
    border-radius:12px;
    box-shadow:0 0 20px rgba(212,175,55,0.1);
    border:1px solid rgba(212,175,55,0.2);
    text-align:center;
}

/* TITLE */
h1{
    margin-bottom:20px;
    color:#ffffff;
}

/* TEXT */
p{
    margin:12px 0;
    color:#cbd5e1;
    font-size:16px;
}

/* HIGHLIGHT LABEL */
strong{
    color:#d4af37;
}

/* FOOTER */

    background:#0b1320;
    color:#cbd5e1;
    display:flex;
    justify-content:space-between;
    padding:15px 30px;
    margin-top:30px;
    border-top:2px solid #d4af37;
}

footer a{
    color:#d4af37;
    text-decoration:none;
}

footer a:hover{
    text-decoration:underline;
}
